  <style>
    /* ---------- Design tokens ----------
       Light/dark UI surfaces. The *editor* respects prefers-color-scheme; the *display*
       view always uses the user's chosen foreground/background regardless of OS theme. */
    :root {
      --bg: #f6f6f7;
      --surface: #ffffff;
      --surface-2: #ececef;
      --border: #d0d2d6;
      --text: #111418;
      --text-muted: #5b6068;
      --accent: #1f6feb;
      --accent-contrast: #ffffff;
      --focus: #1f6feb;
      --shadow: 0 1px 3px rgba(0,0,0,.06), 0 4px 14px rgba(0,0,0,.06);
      --radius: 14px;
      --tap: 44px; /* WCAG 2.5.5 minimum touch target */
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #101114;
        --surface: #181a1f;
        --surface-2: #22252b;
        --border: #2e323a;
        --text: #f1f3f5;
        --text-muted: #aab0b8;
        --accent: #5aa3ff;
        --accent-contrast: #0b1220;
        --focus: #80b8ff;
        --shadow: 0 1px 3px rgba(0,0,0,.4), 0 4px 14px rgba(0,0,0,.35);
      }
    }

    /* ---------- Reset-ish ---------- */
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    html { -webkit-text-size-adjust: 100%; }
    /* Make the [hidden] attribute actually hide elements even when an author
       rule sets `display:` on the same element. Without this, .display below
       (which uses `display: flex`) would override the UA `[hidden]{display:none}`
       and the sign overlay would cover the editor from page load. */
    [hidden] { display: none !important; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      color: var(--text);
      background: var(--bg);
      min-height: 100dvh; /* dvh: respects mobile dynamic toolbars */
      line-height: 1.4;
    }

    /* Accessible focus indicator (used everywhere via :focus-visible). */
    :focus { outline: none; }
    :focus-visible {
      outline: 3px solid var(--focus);
      outline-offset: 2px;
      border-radius: 8px;
    }

    /* ---------- Layout: editor ---------- */
    main.editor {
      max-width: 640px;
      margin: 0 auto;
      padding: 16px 16px 24px;
      padding-bottom: calc(24px + env(safe-area-inset-bottom));
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .brand {
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin: 2px 0;
    }
    .brand h1 {
      font-size: 1.35rem;
      margin: 0;
      letter-spacing: -0.01em;
      flex: 0 0 auto;
    }
    .brand .tagline {
      color: var(--text-muted);
      font-size: .85rem;
      flex: 1 1 auto;
      min-width: 0;
    }
    /* Language select lives inline in the brand row, pushed right by the flex
       layout. align-self overrides the parent's baseline so the select sits
       vertically centered relative to the brand title. */
    .brand select {
      flex: 0 0 auto;
      align-self: center;
      margin-left: auto;
      min-height: 36px;
      max-width: 50%;
      padding: 6px 8px;
      font: inherit;
      font-size: .9rem;
      color: var(--text);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }
    /* On narrow screens the tagline shrinks/wraps awkwardly with both the title
       and dropdown competing for room — hide it so the row stays clean. */
    @media (max-width: 480px) {
      .brand .tagline { display: none; }
    }

    /* The sign text input. Large by default — encourages the right kind of input.
       The .field wrapper is no longer a <label> because it now also contains the
       interactive tab strip; the label/legend association is done via aria. */
    .field { display: flex; flex-direction: column; gap: 8px; }
    .field > .lbl {
      font-weight: 600;
      font-size: .95rem;
      color: var(--text-muted);
    }
    textarea#text {
      width: 100%;
      min-height: 5.5rem;
      resize: vertical;
      padding: 14px;
      font: inherit;
      font-size: 1.3rem;
      line-height: 1.25;
      color: var(--text);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      /* Margin-top:0 + flush corner so the textarea docks visually under the active tab. */
      margin-top: 0;
      border-top-left-radius: 0;
    }
    textarea#text::placeholder { color: var(--text-muted); }

    /* ---------- Tab strip ----------
       Horizontal, scrollable on overflow. The textarea's top-left corner is squared
       off above so the active tab visually "owns" the input below it.
       `position: relative` is required so the drag drop-indicator can be
       absolutely positioned inside the strip. */
    .tabs {
      position: relative;
      display: flex;
      align-items: stretch;
      gap: 4px;
      overflow-x: auto;
      /* Trim the gap between tabs and the textarea — no margin-bottom here. */
      margin: 0 0 -1px 0;
      padding: 0 2px 0 0;
      /* Hide native scrollbar on WebKit; keep keyboard scroll working. */
      scrollbar-width: thin;
    }
    .tabs::-webkit-scrollbar { height: 6px; }
    .tabs::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .tab {
      position: relative;            /* makes the dragging transform stack correctly */
      display: inline-flex;
      align-items: center;
      gap: 4px;
      flex: 0 0 auto;
      min-height: 36px;          /* Secondary tap target; the textarea below is the real focus. */
      max-width: 110px;          /* hard cap on overall tab width — keeps the strip from blowing out */
      min-width: 0;              /* allow flex children (the label) to shrink below their content width */
      padding: 4px 6px 4px 12px;
      background: var(--surface-2);
      color: var(--text);
      border: 1px solid var(--border);
      border-bottom: 1px solid var(--border); /* Will overlap the textarea's top border. */
      border-radius: 10px 10px 0 0;
      font: inherit;
      font-size: .92rem;
      cursor: pointer;
      white-space: nowrap;
      user-select: none;             /* prevent text selection while dragging */
      -webkit-user-select: none;
      /* `touch-action: none` lets us own touch gestures on a tab (long-press →
         drag). The empty space and the + button keep default touch-action, so
         the strip can still be scrolled horizontally on touch via that area. */
      touch-action: none;
    }
    /* Active drag visuals. Lifted with a shadow + scale so the user feels the
       tab "pop" off the strip. Transitions are off so the drag transform we
       set in JS isn't fighting an interpolation. */
    .tab.dragging {
      opacity: 0.92;
      z-index: 3;
      cursor: grabbing;
      box-shadow: 0 6px 18px rgba(0,0,0,.28);
      transition: none;
    }
    /* The drop indicator is a thin vertical accent bar showing where the
       dragged tab will land. Positioned inside .tabs via JS in scroll-content
       coordinates so it scrolls with the strip. */
    .drop-indicator {
      position: absolute;
      top: 4px;
      bottom: 5px;                   /* leave 1px gap above the textarea border */
      width: 3px;
      border-radius: 2px;
      background: var(--accent);
      pointer-events: none;
      z-index: 2;
    }
    .tab[aria-selected="true"] {
      background: var(--surface);
      font-weight: 700;
      /* Subtle accent rail so the active tab reads at a glance. */
      box-shadow: inset 0 3px 0 0 var(--accent);
    }
    .tab .tab-label {
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 70px;
      /* min-width: 0 + flex: 1 1 auto lets the label shrink to fit the tab
         (default `min-width: auto` on flex items would force it to its
         max-content width, defeating the ellipsis). */
      min-width: 0;
      flex: 1 1 auto;
    }
    .tab .tab-label.is-blank {
      /* Visually de-emphasize the auto-generated "Blank" placeholder label. */
      color: var(--text-muted);
      font-style: italic;
      font-weight: 500;
    }
    .tab-close {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 22px;
      height: 22px;
      padding: 0;
      border: none;
      background: transparent;
      color: var(--text-muted);
      border-radius: 50%;
      font-size: 14px;
      line-height: 1;
      cursor: pointer;
    }
    .tab-close:hover { background: rgba(127,127,127,.2); color: var(--text); }
    /* Only one tab → no close button (per design). The .solo class is toggled by JS. */
    .tabs.solo .tab-close { display: none; }

    .tab-add {
      flex: 0 0 auto;
      min-width: 36px;
      min-height: 36px;
      padding: 0 10px;
      border: 1px dashed var(--border);
      border-bottom: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      border-radius: 10px 10px 0 0;
      font: inherit;
      font-size: 1.1rem;
      cursor: pointer;
    }
    .tab-add:hover { color: var(--text); background: var(--surface-2); }

    /* ---------- Carousel section ----------
       Visually mirrors the colors fieldset for consistency. mode-row and
       interval-row sit side-by-side inside .carousel-body and wrap onto a
       new line only when the viewport can't fit both. */
    fieldset.carousel {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      padding: 10px 12px 12px;
      box-shadow: var(--shadow);
      margin: 0;
    }
    fieldset.carousel legend {
      padding: 0 6px;
      font-weight: 600;
      color: var(--text-muted);
      font-size: .9rem;
    }
    .carousel-body {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
    }
    .mode-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    button.mode {
      min-height: 38px;
      padding: 4px 12px;
      border: 1px solid var(--border);
      background: var(--surface-2);
      color: var(--text);
      border-radius: 999px;
      font: inherit;
      font-weight: 600;
      font-size: .92rem;
      cursor: pointer;
    }
    button.mode[aria-pressed="true"] {
      background: var(--accent);
      color: var(--accent-contrast);
      border-color: var(--accent);
    }

    .interval-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 6px;
      margin-top: 0;
    }
    .interval-row .picker-label {
      font-size: .9rem;
      color: var(--text-muted);
    }
    .interval-presets {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .interval-presets button {
      min-height: 36px;
      padding: 4px 10px;
      border: 1px solid var(--border);
      background: var(--surface-2);
      color: var(--text);
      border-radius: 8px;
      font: inherit;
      font-size: .9rem;
      cursor: pointer;
    }
    .interval-presets button[aria-pressed="true"] {
      outline: 2px solid var(--accent);
      outline-offset: 1px;
    }
    #interval-custom {
      width: 5em;
      min-height: 36px;
      padding: 4px 8px;
      font: inherit;
      color: var(--text);
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 8px;
    }
    /* Dim the interval controls when carousel is off — visual only, still focusable. */
    .interval-row.disabled { opacity: .5; }

    /* When only one tab exists, carousel is meaningless — hide the whole fieldset. */
    .hidden-when-solo { display: none; }

    /* ---------- Color controls ----------
       Fieldset is legend-less; aria-label provides the accessible name. The
       🎨 glyph sits as the first picker-row cell so the colors get a visible
       group cue without the vertical cost of a legend. */
    fieldset.colors {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      padding: 10px 12px 12px;
      box-shadow: var(--shadow);
      margin: 0;
    }
    .picker-row {
      display: grid;
      grid-template-columns: 1fr 1fr auto;
      gap: 8px;
      align-items: stretch;
    }
    .picker {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 10px;
      min-height: var(--tap);
    }
    /* Native color input — let the browser render its swatch UI but give it a clean frame. */
    .picker input[type="color"] {
      -webkit-appearance: none;
      appearance: none;
      width: 44px;
      height: 32px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: transparent;
      padding: 0;
      cursor: pointer;
    }
    .picker input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
    .picker input[type="color"]::-webkit-color-swatch { border: none; border-radius: 7px; }
    .picker input[type="color"]::-moz-color-swatch { border: none; border-radius: 7px; }

    button.swap {
      min-width: var(--tap);
      min-height: var(--tap);
      font-size: 1.25rem;
      border: 1px solid var(--border);
      background: var(--surface-2);
      color: var(--text);
      border-radius: 10px;
      cursor: pointer;
    }
    button.swap:hover { background: var(--border); }

    /* Preset swatches. Each preset is a miniature sign preview rendered in its own colors. */
    .presets {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(56px, 1fr));
      gap: 6px;
      margin-top: 8px;
    }
    button.preset {
      min-height: 38px;
      padding: 6px 4px;
      border-radius: 10px;
      border: 1px solid var(--border);
      cursor: pointer;
      font-weight: 800;
      font-size: 1rem;
      line-height: 1;
      /* fg/bg are injected via inline style so each swatch shows the actual combo at a glance. */
    }
    button.preset[aria-pressed="true"] {
      outline: 3px solid var(--accent);
      outline-offset: 2px;
    }

    /* ---------- Live preview ----------
       The label header is omitted entirely — the colored block speaks for
       itself and one less row of chrome keeps the editor compact. */
    .preview-wrap {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .preview {
      /* Stand-in for the real fullscreen sign. Same auto-fit algorithm runs
         against this box. */
      height: 130px;
      margin: 8px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      overflow: hidden;
      position: relative;
    }
    .preview .preview-text {
      /* font-size is set programmatically by the auto-fit routine. */
      font-weight: 900;
      line-height: 1.05;
      white-space: pre-line;     /* Honor explicit \n, collapse other whitespace. */
      overflow-wrap: anywhere;   /* Long words wrap rather than overflow. */
      padding: 8px 10px;
      max-width: 100%;
      max-height: 100%;
    }

    /* ---------- Primary action ---------- */
    button.show {
      min-height: 48px;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--accent-contrast);
      background: var(--accent);
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      box-shadow: var(--shadow);
    }
    button.show:hover { filter: brightness(1.05); }
    button.show:active { transform: translateY(1px); }
    button.show:disabled {
      opacity: .5;
      cursor: not-allowed;
    }

    /* ---------- Export panel ----------
       Collapsible via <details>. Sits under the Show Sign button — it's a
       secondary feature, so the closed-by-default state keeps the editor
       focused. */
    details.export {
      margin: 0;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      box-shadow: var(--shadow);
    }
    details.export > summary {
      list-style: none;
      cursor: pointer;
      padding: 10px 12px;
      font-weight: 600;
      font-size: .95rem;
      color: var(--text-muted);
      user-select: none;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    details.export > summary::-webkit-details-marker { display: none; }
    details.export > summary::after {
      content: '▾';
      margin-left: auto;
      font-size: 1.8em;
      line-height: 1;          /* keep summary height tight despite the larger glyph */
      color: var(--text);      /* slightly darker than the muted "Export" label for emphasis */
      transition: transform .15s ease;
    }
    details.export[open] > summary::after { transform: rotate(180deg); }
    .export-body {
      padding: 0 12px 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .export-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
    }
    .export-row .picker-label { font-size: .9rem; color: var(--text-muted); }
    .export-row select {
      flex: 1 1 auto;
      min-width: 8em;
      min-height: 36px;
      padding: 6px 8px;
      font: inherit;
      color: var(--text);
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 8px;
    }
    .export-size input {
      width: 5.5em;
      min-height: 36px;
      padding: 4px 8px;
      font: inherit;
      color: var(--text);
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      text-align: center;
    }
    .export-formats {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    button.export-fmt {
      flex: 1 1 0;
      min-width: 64px;
      min-height: 40px;
      padding: 6px 10px;
      border: 1px solid var(--border);
      background: var(--surface-2);
      color: var(--text);
      border-radius: 8px;
      font: inherit;
      font-weight: 700;
      font-size: .92rem;
      letter-spacing: .02em;
      cursor: pointer;
    }
    button.export-fmt:hover { background: var(--border); }
    button.export-fmt:disabled { opacity: .5; cursor: progress; }

    /* ---------- Footer / credit ---------- */
    footer.credit {
      margin-top: 4px;
      font-size: .8rem;
      color: var(--text-muted);
      text-align: center;
      line-height: 1.45;
    }
    footer.credit a { color: var(--text); }

    /* ---------- Display (sign) view ----------
       Fixed full-viewport overlay. Visibility is toggled by the [hidden] attribute. */
    .display {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      cursor: pointer;
      /* Background/foreground are set inline at show time. */
      /* z-index keeps it above any sticky elements we might add later. */
      z-index: 9999;
      /* When using the Fullscreen API on iOS-equivalents that fall back, we still need
         to cover everything including safe-area insets. */
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }
    .display .sign-text {
      font-weight: 900;
      line-height: 1.05;
      white-space: pre-line;
      overflow-wrap: anywhere;
      max-width: 100%;
      max-height: 100%;
      padding: 12px;
      /* font-size set programmatically. */
    }
    /* Small unobtrusive hint that the user can tap to exit. Fades out after a moment. */
    .display .exit-hint {
      position: absolute;
      bottom: max(14px, env(safe-area-inset-bottom));
      left: 50%;
      transform: translateX(-50%);
      font-size: .85rem;
      font-weight: 600;
      padding: 6px 12px;
      border-radius: 999px;
      background: rgba(0,0,0,.35);
      color: #fff;
      pointer-events: none;
      opacity: 1;
      transition: opacity .8s ease 2.2s; /* 2.2s visible, then fade. */
    }
    .display.has-faded .exit-hint { opacity: 0; }
    /* If the sign uses a dark-on-light scheme the dark pill still reads OK; if it's
       light-on-dark we let it sit naturally. We don't try to invert it. */

    /* ---------- Reduced motion ---------- */
    @media (prefers-reduced-motion: reduce) {
      .display .exit-hint { transition: none; }
      button.show:active { transform: none; }
    }

    /* ---------- Visually hidden helper ---------- */
    .sr-only {
      position: absolute;
      width: 1px; height: 1px;
      padding: 0; margin: -1px;
      overflow: hidden; clip: rect(0,0,0,0);
      white-space: nowrap; border: 0;
    }
  </style>
</head>
<body>
  <!-- ===================== EDITOR VIEW ===================== -->
  <main class="editor" id="editor" aria-labelledby="brand-title">
    <header class="brand">
      <h1 id="brand-title">CurbSign</h1>
      <span class="tagline" data-t="tagline"></span>
      <!-- Language dropdown lives in the brand row, right-justified by
           margin-left: auto. Options are populated in JS so we don't ship a
           giant <option> list in the HTML source. -->
      <select id="lang" aria-label="Language" data-t-aria-label="language_label"></select>
    </header>

    <div class="field">
      <!-- Tab strip is rebuilt by renderTabs() on every state change. The trailing
           "+ Add tab" button is appended after the tab buttons. role=tablist /
           role=tab give assistive tech the right semantics; we manage focus via
           ArrowLeft/ArrowRight in the JS layer. -->
      <div class="tabs" id="tabs" role="tablist"
           aria-label="Signs" data-t-aria-label="signs_aria"></div>
      <textarea
        id="text"
        rows="3"
        placeholder="Text goes here"
        data-t-placeholder="text_placeholder"
        aria-label="Sign text. Press Enter for a new line."
        data-t-aria-label="text_aria"
        autocomplete="off"
        autocapitalize="words"
        spellcheck="false"></textarea>
    </div>

    <fieldset class="colors" aria-label="Colors" data-t-aria-label="colors">
      <div class="picker-row">
        <label class="picker" for="fg">
          <span class="sr-only" data-t="text_color">Text color</span>
          <input type="color" id="fg" value="#000000"
                 aria-label="Text color" data-t-aria-label="text_color">
        </label>
        <label class="picker" for="bg">
          <span class="sr-only" data-t="bg_color">Background color</span>
          <input type="color" id="bg" value="#ffffff"
                 aria-label="Background color" data-t-aria-label="bg_color">
        </label>
        <button type="button" class="swap" id="swap"
                aria-label="Swap colors" title="Swap colors"
                data-t-aria-label="swap" data-t-title="swap">🔄</button>
      </div>
      <!-- Preset combos rendered into here by JS so each swatch can show its actual look. -->
      <div class="presets" id="presets" role="group"
           aria-label="Preset color combinations"
           data-t-aria-label="presets_aria"></div>
    </fieldset>

    <fieldset class="carousel" id="carousel">
      <legend>🔁 <span data-t="carousel">Carousel Animation</span></legend>
      <!-- .carousel-body is a flex-wrap container: mode chips and the
           "Change every N seconds" row sit on the same line when there's
           room, and wrap to two rows on narrow screens. -->
      <div class="carousel-body">
        <div class="mode-row" role="radiogroup"
             aria-label="Carousel mode" data-t-aria-label="carousel_mode_aria">
          <button type="button" class="mode" data-mode="off" aria-pressed="true">⏸️ <span data-t="mode_off">Off</span></button>
          <button type="button" class="mode" data-mode="sequential" aria-pressed="false">▶️ <span data-t="mode_sequential">In order</span></button>
          <button type="button" class="mode" data-mode="random" aria-pressed="false">🎲 <span data-t="mode_random">Random</span></button>
        </div>
        <div class="interval-row" id="interval-row">
          <span class="picker-label" data-t="change_every">Change every</span>
          <div class="interval-presets" id="interval-presets" role="group"
               aria-label="Interval presets" data-t-aria-label="interval_presets_aria">
            <button type="button" data-secs="2">2s</button>
            <button type="button" data-secs="5">5s</button>
            <button type="button" data-secs="10">10s</button>
            <button type="button" data-secs="30">30s</button>
            <button type="button" data-secs="60">1m</button>
          </div>
          <input type="number" id="interval-custom" min="1" max="600" step="1"
                 inputmode="numeric"
                 aria-label="Custom interval in seconds"
                 data-t-aria-label="interval_custom">
          <span class="picker-label" data-t="seconds">seconds</span>
        </div>
      </div>
    </fieldset>

    <div class="preview-wrap" aria-live="polite">
      <div class="preview" id="preview" role="img"
           aria-label="Preview of your sign" data-t-aria-label="preview_aria">
        <div class="preview-text" id="preview-text"></div>
      </div>
    </div>

    <button type="button" class="show" id="show"
            aria-label="Show sign fullscreen" data-t-aria-label="show_aria">
      🪧 <span data-t="show">Show Sign</span>
    </button>

    <!-- Export — secondary feature, collapsed by default. Resolution dropdown
         is populated in JS; the custom width/height inputs are bidirectionally
         synced with the dropdown via Export.syncFromInputs(). -->
    <details class="export" id="export">
      <summary><span data-t="export">Export</span></summary>
      <div class="export-body">
        <div class="export-row">
          <label class="picker-label" for="export-resolution" data-t="resolution">Resolution</label>
          <select id="export-resolution"></select>
        </div>
        <div class="export-row export-size">
          <input type="number" id="export-w" value="1920" min="16" max="16384"
                 inputmode="numeric" aria-label="Width">
          <span aria-hidden="true">×</span>
          <input type="number" id="export-h" value="1080" min="16" max="16384"
                 inputmode="numeric" aria-label="Height">
        </div>
        <div class="export-formats">
          <button type="button" class="export-fmt" data-fmt="apng">APNG</button>
          <button type="button" class="export-fmt" data-fmt="gif">GIF</button>
          <button type="button" class="export-fmt" data-fmt="webp">WebP</button>
          <button type="button" class="export-fmt" data-fmt="svg">SVG</button>
          <button type="button" class="export-fmt" data-fmt="html">HTML</button>
        </div>
      </div>
    </details>

    <!-- Footer credit is rendered by JS so the {author} link slot is in the
         middle of the localized sentence regardless of word order. -->
    <footer class="credit" id="credit"></footer>
  </main>

  <!-- ===================== DISPLAY (SIGN) VIEW =====================
       Hidden until the user taps Show Sign. Clicking/tapping anywhere exits. -->
  <section class="display" id="display" hidden aria-hidden="true"
           aria-label="Sign — tap anywhere to exit" data-t-aria-label="exit_aria">
    <div class="sign-text" id="sign-text"></div>
    <div class="exit-hint" aria-hidden="true">👆 <span data-t="exit_hint">Tap to exit</span></div>
  </section>
