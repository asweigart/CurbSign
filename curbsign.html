  // ----- Language detection & persistence ------------------------------------
  function detectLanguage() {
    const supported = new Set(LANGS.map(l => l.code));
    const candidates = Array.isArray(navigator.languages) && navigator.languages.length
      ? navigator.languages
      : [navigator.language || 'en'];
    for (const raw of candidates) {
      if (typeof raw !== 'string') continue;
      const primary = raw.toLowerCase().split('-')[0];
      // Special remappings: legacy codes + scripts/variants we collapse to one supported code.
      let mapped = primary;
      if (primary === 'no') mapped = 'nb';        // Norwegian general → Bokmål
      else if (primary === 'tl') mapped = 'fil';  // Tagalog → Filipino
      else if (primary === 'iw') mapped = 'he';   // Hebrew legacy code
      else if (primary === 'in') mapped = 'id';   // Indonesian legacy code
      if (supported.has(mapped)) return mapped;
    }
    return 'en';
  }

  function loadLanguage() {
    try {
      const saved = localStorage.getItem(LANG_KEY);
      if (saved && TRANSLATIONS[saved]) return saved;
    } catch { /* ignore */ }
    return detectLanguage();
  }

  function saveLanguage(code) {
    try { localStorage.setItem(LANG_KEY, code); } catch { /* ignore */ }
  }

  // The active language code. All translation lookups go through t().
  let currentLang = loadLanguage();
  function t(key) {
    return (TRANSLATIONS[currentLang] && TRANSLATIONS[currentLang][key])
        || TRANSLATIONS.en[key]
        || key;
  }

  // Walk every element with a data-t* attribute and update it. We do NOT cache
  // the NodeLists — language changes are infrequent and DOM size is tiny, so
  // querying each time keeps the helper simple.
  function applyTranslations() {
    document.querySelectorAll('[data-t]').forEach(el => {
      el.textContent = t(el.dataset.t);
    });
    document.querySelectorAll('[data-t-placeholder]').forEach(el => {
      el.placeholder = t(el.dataset.tPlaceholder);
    });
    document.querySelectorAll('[data-t-aria-label]').forEach(el => {
      el.setAttribute('aria-label', t(el.dataset.tAriaLabel));
    });
    document.querySelectorAll('[data-t-title]').forEach(el => {
      el.title = t(el.dataset.tTitle);
    });
    // Document-level metadata: direction (for Arabic/Persian/Hebrew/Urdu) and
    // the `lang` attribute (helps screen readers pick a voice).
    document.documentElement.dir = RTL_LANGS.has(currentLang) ? 'rtl' : 'ltr';
    document.documentElement.lang = currentLang;
    // JS-rendered surfaces that don't use data-t*.
    if (typeof renderTabs === 'function') renderTabs();
    if (typeof renderCredit === 'function') renderCredit();
  }

  // ----- Storage --------------------------------------------------------------
  // The key is unchanged across schema versions — versioning lives inside the
  // payload. Older copies of this .html file may still be in the wild, so the
  // load path is tolerant of older shapes (currently v1).
  const STORAGE_KEY = 'curbsign.state.v1';
  const STORAGE_VERSION = 2;

  const VALID_CAROUSEL_MODES = ['off', 'sequential', 'random'];

  // A blank tab is a valid sign (it just shows the background color fullscreen).
  function makeBlankTab() {
    return { text: '', fg: '#000000', bg: '#ffffff' };
  }

  function makeDefaultState() {
    return {
      version: STORAGE_VERSION,
      activeTabIdx: 0,
      tabs: [ makeBlankTab() ],
      carousel: { mode: 'off', intervalSeconds: 5 },
    };
  }

  function isHexColor(v) {
    return typeof v === 'string' && /^#[0-9a-fA-F]{6}$/.test(v);
  }

  // Coerce any parsed object — possibly v1, possibly malformed — into a clean v2.
  function normalizeState(parsed) {
    if (!parsed || typeof parsed !== 'object') return makeDefaultState();

    // v1 detection: top-level `text` and no `tabs` array. Migrate by wrapping it
    // as a single tab; preserve colors if valid.
    if (parsed.tabs === undefined && typeof parsed.text === 'string') {
      return {
        version: STORAGE_VERSION,
        activeTabIdx: 0,
        tabs: [{
          text: parsed.text,
          fg: isHexColor(parsed.fg) ? parsed.fg : '#000000',
          bg: isHexColor(parsed.bg) ? parsed.bg : '#ffffff',
        }],
        carousel: { mode: 'off', intervalSeconds: 5 },
      };
    }

    // v2: defensively rebuild each tab.
    const tabs = Array.isArray(parsed.tabs) && parsed.tabs.length > 0
      ? parsed.tabs.map(t => ({
          text: typeof t?.text === 'string' ? t.text : '',
          fg: isHexColor(t?.fg) ? t.fg : '#000000',
          bg: isHexColor(t?.bg) ? t.bg : '#ffffff',
        }))
      : [ makeBlankTab() ];

    const activeTabIdx = Math.max(0, Math.min(
      Number.isInteger(parsed.activeTabIdx) ? parsed.activeTabIdx : 0,
      tabs.length - 1
    ));

    const c = parsed.carousel || {};
    const mode = VALID_CAROUSEL_MODES.includes(c.mode) ? c.mode : 'off';
    const rawSecs = Number(c.intervalSeconds);
    const intervalSeconds = Number.isFinite(rawSecs)
      ? Math.max(1, Math.min(600, Math.round(rawSecs)))
      : 5;

    return {
      version: STORAGE_VERSION,
      activeTabIdx,
      tabs,
      carousel: { mode, intervalSeconds },
    };
  }

  function loadState() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return makeDefaultState();
      return normalizeState(JSON.parse(raw));
    } catch {
      // Corrupt/disabled storage shouldn't break the app — fall back silently.
      return makeDefaultState();
    }
  }

  // Debounced save: typing into the textarea triggers many writes; coalesce them.
  let saveTimer = null;
  function saveState(s) {
    clearTimeout(saveTimer);
    saveTimer = setTimeout(() => {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); }
      catch { /* quota / private-mode: ignore */ }
    }, 200);
  }

  // ----- DOM refs -------------------------------------------------------------
  const $text            = document.getElementById('text');
  const $fg              = document.getElementById('fg');
  const $bg              = document.getElementById('bg');
  const $swap            = document.getElementById('swap');
  const $presets         = document.getElementById('presets');
  const $preview         = document.getElementById('preview');
  const $previewT        = document.getElementById('preview-text');
  const $show            = document.getElementById('show');
  const $display         = document.getElementById('display');
  const $signText        = document.getElementById('sign-text');
  const $tabs            = document.getElementById('tabs');
  const $carousel        = document.getElementById('carousel');
  const $intervalRow     = document.getElementById('interval-row');
  const $intervalPresets = document.getElementById('interval-presets');
  const $intervalCustom  = document.getElementById('interval-custom');
  const $lang            = document.getElementById('lang');
  const $credit          = document.getElementById('credit');

  // ----- Language dropdown ---------------------------------------------------
  function renderLanguageDropdown() {
    // Render once; we set .value separately to reflect the current selection.
    if ($lang.children.length === 0) {
      const frag = document.createDocumentFragment();
      LANGS.forEach(({ code, name }) => {
        const opt = document.createElement('option');
        opt.value = code;
        opt.textContent = name;
        // The option label is each language's *own* name so users can recognize
        // their language even when the active UI language is unfamiliar.
        opt.lang = code;
        frag.appendChild(opt);
      });
      $lang.appendChild(frag);
    }
    $lang.value = currentLang;
  }

  $lang && $lang.addEventListener('change', () => {
    currentLang = $lang.value;
    saveLanguage(currentLang);
    applyTranslations();
  });

  // Render the footer credit. The translated `credit` string contains the
  // literal placeholder "{author}" — we split around it so the <a> link to
  // inventwithpython.com sits inside the localized sentence (which can have
  // very different word order than English).
  function renderCredit() {
    if (!$credit) return;
    const template = t('credit');
    const [before, after = ''] = template.split('{author}');
    $credit.textContent = '';
    $credit.appendChild(document.createTextNode(before));
    const a = document.createElement('a');
    a.href = 'https://inventwithpython.com';
    a.target = '_blank';
    a.rel = 'noopener noreferrer';
    a.textContent = 'Al Sweigart'; // Untranslated by design — it's a name.
    $credit.appendChild(a);
    $credit.appendChild(document.createTextNode(after));
  }

  // ----- Preset color combinations --------------------------------------------
  // Ordered by visibility-at-distance. The first one is the default (black/white).
  // Each preset stores both directions of the swap so the same array can drive
  // the "active preset" highlight regardless of which way the user swapped.
  const PRESETS = [
    { fg: '#000000', bg: '#ffffff', label: 'Aa' }, // classic
    { fg: '#ffffff', bg: '#000000', label: 'Aa' }, // inverse
    { fg: '#000000', bg: '#ffd400', label: 'Aa' }, // high-vis taxi yellow
    { fg: '#ffd400', bg: '#000000', label: 'Aa' },
    { fg: '#ffffff', bg: '#c0392b', label: 'Aa' }, // white on red
    { fg: '#ffffff', bg: '#1f4eaa', label: 'Aa' }, // white on blue
    { fg: '#000000', bg: '#2ecc71', label: 'Aa' }, // black on green
    { fg: '#ffffff', bg: '#6f2dbd', label: 'Aa' }, // white on purple
  ];

  function renderPresets() {
    // Build once; never need to re-render on color change because we only flip
    // the aria-pressed attribute below.
    const frag = document.createDocumentFragment();
    PRESETS.forEach((p, i) => {
      const b = document.createElement('button');
      b.type = 'button';
      b.className = 'preset';
      b.style.color = p.fg;
      b.style.background = p.bg;
      // High-contrast border so light-on-light or dark-on-dark presets are still visible.
      b.style.borderColor = mixToward(p.bg, p.fg, 0.5);
      b.textContent = p.label;
      b.setAttribute('aria-label', `Preset: text ${p.fg}, background ${p.bg}`);
      b.dataset.idx = String(i);
      b.addEventListener('click', () => applyPreset(i));
      frag.appendChild(b);
    });
    $presets.appendChild(frag);
  }

  // Blend two #rrggbb colors by `t` (0..1). Used to derive a visible border for
  // each preset swatch regardless of how close fg and bg are to the page bg.
  function mixToward(a, b, t) {
    const ax = hexToRgb(a), bx = hexToRgb(b);
    const r = Math.round(ax.r + (bx.r - ax.r) * t);
    const g = Math.round(ax.g + (bx.g - ax.g) * t);
    const bl = Math.round(ax.b + (bx.b - ax.b) * t);
    return `rgb(${r},${g},${bl})`;
  }
  function hexToRgb(h) {
    return { r: parseInt(h.slice(1,3),16), g: parseInt(h.slice(3,5),16), b: parseInt(h.slice(5,7),16) };
  }

  function updatePresetHighlight() {
    const cur = { fg: currentTab().fg.toLowerCase(), bg: currentTab().bg.toLowerCase() };
    [...$presets.children].forEach((btn, i) => {
      const p = PRESETS[i];
      const active = p.fg.toLowerCase() === cur.fg && p.bg.toLowerCase() === cur.bg;
      btn.setAttribute('aria-pressed', active ? 'true' : 'false');
    });
  }

  function applyPreset(i) {
    const p = PRESETS[i];
    const t = currentTab();
    t.fg = p.fg;
    t.bg = p.bg;
    $fg.value = p.fg;
    $bg.value = p.bg;
    onColorsChanged();
  }

  // ----- State + bindings -----------------------------------------------------
  const state = loadState();

  // Tiny accessor — keeps every read/write site honest about "current tab" and
  // makes refactoring (e.g., to a different active-tab strategy) localized.
  function currentTab() { return state.tabs[state.activeTabIdx]; }

  // Sync the three free-form controls (textarea + color pickers) to the active
  // tab. Called after any tab switch, add, or close. Does NOT touch tabs/carousel
  // DOM — those are updated by their own render functions.
  function syncControlsFromActiveTab() {
    const t = currentTab();
    $text.value = t.text;
    $fg.value   = t.fg;
    $bg.value   = t.bg;
  }

  // ----- Tab strip -----------------------------------------------------------
  // Auto-derived label: first non-empty line, trimmed, or the localized
  // equivalent of "Blank".
  function labelForTab(tab) {
    const firstLine = (tab.text || '').split('\n')[0].trim();
    return { text: firstLine || t('tab_blank'), blank: firstLine.length === 0 };
  }

  // Full rebuild on every change. Tab counts are tiny in practice (handful at
  // most), so a diff would be premature complexity.
  function renderTabs() {
    $tabs.innerHTML = '';
    $tabs.classList.toggle('solo', state.tabs.length === 1);

    state.tabs.forEach((tab, i) => {
      const active = i === state.activeTabIdx;
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'tab';
      btn.setAttribute('role', 'tab');
      btn.setAttribute('aria-selected', active ? 'true' : 'false');
      // Only the active tab is in the natural tab order; ArrowLeft/Right move
      // focus among the others (standard ARIA tablist pattern).
      btn.tabIndex = active ? 0 : -1;
      btn.dataset.idx = String(i);

      const lbl = labelForTab(tab);
      const labelSpan = document.createElement('span');
      labelSpan.className = 'tab-label' + (lbl.blank ? ' is-blank' : '');
      labelSpan.textContent = lbl.text;
      btn.appendChild(labelSpan);

      const close = document.createElement('button');
      close.type = 'button';
      close.className = 'tab-close';
      // tab_close contains "{n}" — substitute the 1-based index.
      close.setAttribute('aria-label', t('tab_close').replace('{n}', String(i + 1)));
      close.title = close.getAttribute('aria-label');
      close.textContent = '×';
      btn.appendChild(close);

      btn.addEventListener('click', () => {
        // Drop any click that lands within the short post-drag window so a
        // synthetic click from the just-finished drag doesn't double as a
        // tab switch. Deliberate user clicks land long after this window.
        if (Date.now() - dragEndedAt < POST_DRAG_CLICK_SUPPRESS_MS) return;
        switchToTab(i);
      });
      close.addEventListener('click', (e) => {
        // Stop the parent tab's click from also firing (which would re-select
        // a tab that's about to disappear).
        e.stopPropagation();
        closeTab(i);
      });
      btn.addEventListener('keydown', onTabKey);
      btn.addEventListener('pointerdown', (e) => onTabPointerDown(e, i));

      $tabs.appendChild(btn);
    });

    // Trailing "+ Add tab" button.
    const add = document.createElement('button');
    add.type = 'button';
    add.className = 'tab-add';
    add.setAttribute('aria-label', t('tab_add'));
    add.title = t('tab_add');
    add.textContent = '+';
    add.addEventListener('click', addTab);
    $tabs.appendChild(add);

    // Drop indicator (hidden until a drag is active). Re-created each render
    // since innerHTML='' above wiped it.
    $dropIndicator = document.createElement('div');
    $dropIndicator.className = 'drop-indicator';
    $dropIndicator.hidden = true;
    $tabs.appendChild($dropIndicator);
  }

  function onTabKey(e) {
    // Lightweight ARIA tablist keyboard handling. Home/End and arrows only.
    const tabsEls = [...$tabs.querySelectorAll('.tab')];
    const idx = tabsEls.indexOf(e.currentTarget);
    if (idx === -1) return;
    let next = -1;
    if (e.key === 'ArrowRight') next = (idx + 1) % tabsEls.length;
    else if (e.key === 'ArrowLeft') next = (idx - 1 + tabsEls.length) % tabsEls.length;
    else if (e.key === 'Home') next = 0;
    else if (e.key === 'End') next = tabsEls.length - 1;
    if (next === -1) return;
    e.preventDefault();
    switchToTab(next);
    // After re-render, the new active tab is the one to focus.
    const newActive = $tabs.querySelector('.tab[aria-selected="true"]');
    if (newActive) newActive.focus();
  }

  function switchToTab(i) {
    if (i < 0 || i >= state.tabs.length || i === state.activeTabIdx) {
      // Even if same index, re-render to refresh the label after a text edit
      // updated it. The caller knows when it's a no-op vs. a refresh.
      if (i === state.activeTabIdx) renderTabs();
      return;
    }
    state.activeTabIdx = i;
    syncControlsFromActiveTab();
    applyToPreview();
    updatePresetHighlight();
    renderTabs();
    saveState(state);
  }

  function addTab() {
    state.tabs.push(makeBlankTab());
    state.activeTabIdx = state.tabs.length - 1;
    syncControlsFromActiveTab();
    applyToPreview();
    updatePresetHighlight();
    renderTabs();
    updateCarouselVisibility();
    saveState(state);
    // Scroll the new tab into view (it's the rightmost real tab — second to last
    // since the + sits at the very end).
    const tabs = $tabs.querySelectorAll('.tab');
    if (tabs.length) tabs[tabs.length - 1].scrollIntoView({ inline: 'end', block: 'nearest' });
  }

  function closeTab(i) {
    // The CSS hides the close button when only one tab exists, so this guard
    // is defense-in-depth.
    if (state.tabs.length <= 1) return;
    state.tabs.splice(i, 1);
    if (i < state.activeTabIdx) state.activeTabIdx -= 1;
    else if (i === state.activeTabIdx) state.activeTabIdx = Math.max(0, i - 1);
    syncControlsFromActiveTab();
    applyToPreview();
    updatePresetHighlight();
    renderTabs();
    updateCarouselVisibility();
    saveState(state);
  }

  // ----- Tab drag-to-reorder --------------------------------------------------
  //
  // Pointer-based slide-to-reorder, identical UX for mouse and touch:
  //   • pointerdown on a tab arms a potential drag (no visual change yet).
  //   • Once the pointer moves > DRAG_THRESHOLD px in *any* direction, we
  //     enter active drag mode: capture the pointer, lift the tab visually,
  //     translate it to follow the pointer, and show the drop indicator at
  //     the target slot.
  //   • On pointerup, splice state.tabs into the new order and re-render.
  //
  // Touch caveat: `.tab { touch-action: none; }` (set in CSS) tells the
  // browser not to handle pan/zoom on a tab, so our pointer events own the
  // gesture. The trade-off: a user can't scroll the page by swiping *on* a
  // tab — they need to swipe in the area below the tabs. Acceptable since
  // the strip is small and at the top.
  //
  // Some browsers fire a synthetic `click` on the captured element after a
  // pointer gesture; we don't want that click to also count as a tab switch.
  // We can't use a "consume on next click" flag because large drags often do
  // NOT produce a synthetic click — and the renderTabs() that follows a
  // reorder detaches the old click target — so the flag would never get
  // consumed and would swallow the user's *next* real click. Instead we
  // record when the last drag ended and ignore any tab click that arrives
  // inside a short window after that. The synthetic click (if any) lands in
  // a few ms; a deliberate user click is much later, so this is safe.
  const DRAG_THRESHOLD = 6;
  const POST_DRAG_CLICK_SUPPRESS_MS = 100;
  let drag = null;            // Active drag state. See onTabPointerDown.
  let $dropIndicator = null;  // <div.drop-indicator>, recreated each renderTabs.
  let dragEndedAt = 0;        // Date.now() of the most recent completed drag.

  function onTabPointerDown(e, idx) {
    if (e.button !== undefined && e.button !== 0) return;
    // Ignore drags initiated on the × close button.
    if (e.target.closest('.tab-close')) return;
    // Nothing to reorder with a single tab.
    if (state.tabs.length <= 1) return;

    drag = {
      idx,
      el: e.currentTarget,
      pointerId: e.pointerId,
      pointerType: e.pointerType,
      startX: e.clientX,
      startY: e.clientY,
      active: false,
      rects: null,
      targetIdx: idx,
    };
  }

  function startDrag() {
    if (!drag) return;
    drag.active = true;
    // Try to capture; ignore if the browser refuses (e.g., synthetic events).
    try { drag.el.setPointerCapture(drag.pointerId); } catch { /* ignore */ }
    drag.el.classList.add('dragging');
    // Snapshot every tab's viewport rect once. Sibling positions don't shift
    // during the drag (the indicator does the talking), so this stays valid.
    drag.rects = [...$tabs.querySelectorAll('.tab')].map(el => el.getBoundingClientRect());
    positionDropIndicator(drag.idx);
  }

  function onWindowPointerMove(e) {
    if (!drag || drag.pointerId !== e.pointerId) return;

    const dx = e.clientX - drag.startX;
    const dy = e.clientY - drag.startY;

    if (!drag.active) {
      if (Math.abs(dx) < DRAG_THRESHOLD && Math.abs(dy) < DRAG_THRESHOLD) return;
      startDrag();
    }

    e.preventDefault(); // suppress text-selection / browser pan while dragging
    // Translate the dragged tab to follow the pointer. Clamp Y to negative
    // (and divide) so the tab lifts a little but doesn't slide off-row.
    drag.el.style.transform =
      `translateX(${dx}px) translateY(${Math.min(0, dy / 4)}px)`;
    drag.targetIdx = computeTargetIdx(e.clientX);
    positionDropIndicator(drag.targetIdx);
  }

  function onWindowPointerUp(e) {
    if (!drag || drag.pointerId !== e.pointerId) return;

    if (drag.active) {
      const from = drag.idx;
      const to = drag.targetIdx;
      // Stamp the end of the drag so tab clicks within the next ~100ms get
      // filtered. See POST_DRAG_CLICK_SUPPRESS_MS above for the rationale.
      dragEndedAt = Date.now();
      finishDragVisuals();
      // No-op if dropped on its original slot (to === from or to === from+1).
      if (to !== from && to !== from + 1) {
        reorderTab(from, to);
      }
    }
    drag = null;
  }

  function onWindowPointerCancel(e) {
    if (!drag || drag.pointerId !== e.pointerId) return;
    cancelDrag();
  }

  function cancelDrag() {
    if (!drag) return;
    if (drag.active) finishDragVisuals();
    drag = null;
  }

  function finishDragVisuals() {
    if (!drag || !drag.active) return;
    drag.el.classList.remove('dragging');
    drag.el.style.transform = '';
    try { drag.el.releasePointerCapture(drag.pointerId); } catch { /* ignore */ }
    hideDropIndicator();
  }

  // Returns the "drop before this tab index" slot, or rects.length for "drop
  // at end". The dragged tab is excluded from the scan so hovering over your
  // own slot doesn't suggest a move.
  function computeTargetIdx(clientX) {
    for (let i = 0; i < drag.rects.length; i++) {
      if (i === drag.idx) continue;
      const r = drag.rects[i];
      const center = r.left + r.width / 2;
      if (clientX < center) return i;
    }
    return drag.rects.length;
  }

  function positionDropIndicator(slot) {
    if (!$dropIndicator || !drag || !drag.rects) return;
    // Hide when the slot is identical to the dragged tab's current slot
    // (visually, the tab would land where it already is).
    if (slot === drag.idx || slot === drag.idx + 1) {
      hideDropIndicator();
      return;
    }
    const tabsRect = $tabs.getBoundingClientRect();
    let xViewport;
    if (slot >= drag.rects.length) {
      xViewport = drag.rects[drag.rects.length - 1].right + 2;
    } else {
      xViewport = drag.rects[slot].left - 2;
    }
    // Convert from viewport coords to the strip's scroll-content coords so
    // the indicator scrolls with the tabs.
    const left = xViewport - tabsRect.left + $tabs.scrollLeft;
    $dropIndicator.style.left = (left - 1) + 'px'; // center the 3px line
    $dropIndicator.hidden = false;
  }

  function hideDropIndicator() {
    if ($dropIndicator) $dropIndicator.hidden = true;
  }

  // Splice the dragged tab into its new slot and update activeTabIdx to point
  // to whichever tab it pointed to before (the move shouldn't change which sign
  // the user is editing).
  function reorderTab(from, to) {
    const [tab] = state.tabs.splice(from, 1);
    // If we're moving rightward, the splice-removal shifted the target slot
    // down by one.
    const insertAt = to > from ? to - 1 : to;
    state.tabs.splice(insertAt, 0, tab);

    const oldActive = state.activeTabIdx;
    if (oldActive === from) {
      state.activeTabIdx = insertAt;
    } else {
      // Track the active tab through the same two splice operations.
      let newActive = oldActive;
      if (oldActive > from) newActive--;            // removal shifted it left
      if (newActive >= insertAt) newActive++;       // insertion shifted it right
      state.activeTabIdx = newActive;
    }

    renderTabs();
    saveState(state);
  }

  // ----- Carousel UI ----------------------------------------------------------
  // Highlight the selected mode and interval preset; sync the custom input.
  function renderCarouselUI() {
    const { mode, intervalSeconds } = state.carousel;
    $carousel.querySelectorAll('button.mode').forEach(btn => {
      btn.setAttribute('aria-pressed', btn.dataset.mode === mode ? 'true' : 'false');
    });
    $intervalPresets.querySelectorAll('button').forEach(btn => {
      btn.setAttribute('aria-pressed',
        Number(btn.dataset.secs) === intervalSeconds ? 'true' : 'false');
    });
    // Only overwrite the custom input if its current value differs — otherwise
    // typing into it would clobber the user's in-progress edit.
    if (Number($intervalCustom.value) !== intervalSeconds) {
      $intervalCustom.value = String(intervalSeconds);
    }
    $intervalRow.classList.toggle('disabled', mode === 'off');
  }

  // Carousel only makes sense with 2+ tabs. Hide the whole fieldset otherwise.
  function updateCarouselVisibility() {
    $carousel.classList.toggle('hidden-when-solo', state.tabs.length <= 1);
  }

  // ----- Event wiring (init) --------------------------------------------------
  // Window-level pointer listeners for tab drag-to-reorder. Attached once;
  // each handler is a cheap early-return when no drag is in progress.
  // pointermove uses {passive: false} so we can preventDefault during a drag.
  window.addEventListener('pointermove', onWindowPointerMove, { passive: false });
  window.addEventListener('pointerup', onWindowPointerUp);
  window.addEventListener('pointercancel', onWindowPointerCancel);

  // Language dropdown must be populated before applyTranslations() so that
  // its data-t-aria-label attribute applies to an existing element.
  renderLanguageDropdown();
  renderPresets();
  syncControlsFromActiveTab();
  applyToPreview();
  updatePresetHighlight();
  renderTabs();
  renderCarouselUI();
  updateCarouselVisibility();
  // Apply translations last so any function declarations referenced (renderTabs,
  // renderCredit) are already defined and accessible to the typeof check inside.
  applyTranslations();

  $text.addEventListener('input', () => {
    currentTab().text = $text.value;
    applyToPreview();
    // Re-render tabs so the active tab's label updates live as the user types.
    renderTabs();
    saveState(state);
  });

  $fg.addEventListener('input', () => {
    currentTab().fg = $fg.value;
    onColorsChanged();
  });
  $bg.addEventListener('input', () => {
    currentTab().bg = $bg.value;
    onColorsChanged();
  });
  $swap.addEventListener('click', () => {
    const t = currentTab();
    const tmp = t.fg; t.fg = t.bg; t.bg = tmp;
    $fg.value = t.fg;
    $bg.value = t.bg;
    onColorsChanged();
  });

  // Mode buttons (radio-group of three).
  $carousel.querySelectorAll('button.mode').forEach(btn => {
    btn.addEventListener('click', () => {
      state.carousel.mode = btn.dataset.mode;
      renderCarouselUI();
      saveState(state);
    });
  });

  // Interval presets.
  $intervalPresets.querySelectorAll('button').forEach(btn => {
    btn.addEventListener('click', () => {
      state.carousel.intervalSeconds = Number(btn.dataset.secs);
      renderCarouselUI();
      saveState(state);
    });
  });

  // Custom seconds input. Clamp on commit so out-of-range values don't poison
  // the timer, but tolerate intermediate empty/invalid values while typing.
  $intervalCustom.addEventListener('input', () => {
    const v = Number($intervalCustom.value);
    if (Number.isFinite(v) && v >= 1 && v <= 600) {
      state.carousel.intervalSeconds = Math.round(v);
      // Update preset highlight without rewriting the input (avoid cursor jumps).
      $intervalPresets.querySelectorAll('button').forEach(b => {
        b.setAttribute('aria-pressed',
          Number(b.dataset.secs) === state.carousel.intervalSeconds ? 'true' : 'false');
      });
      saveState(state);
    }
  });
  $intervalCustom.addEventListener('blur', () => {
    // On blur, snap any invalid value back to the stored one.
    $intervalCustom.value = String(state.carousel.intervalSeconds);
  });

  function onColorsChanged() {
    applyToPreview();
    updatePresetHighlight();
    saveState(state);
  }

  // Mirror state into the preview block and run auto-fit.
  function applyToPreview() {
    const t = currentTab();
    $preview.style.background = t.bg;
    $previewT.style.color = t.fg;
    // Blank text → empty preview (just the colored block).
    $previewT.textContent = t.text || '';
    fitText($preview, $previewT);
  }

  // ----- Auto-fit text algorithm ---------------------------------------------
  // Binary-search the largest integer font size such that the text element fits
  // (in both axes) within its container. We measure scrollWidth/scrollHeight
  // because the actual rendered size is what matters — line-height, wrapping,
  // and explicit newlines all collapse into those values.
  //
  // Cost: O(log(maxFontPx)) layout reads per call. We call it on text change,
  // color change (a no-op layout-wise but cheap), resize, orientation change,
  // and when entering display mode.
  function fitText(container, textEl) {
    if (!container.isConnected) return;
    // Use clientWidth/clientHeight so padding on the container is respected.
    const maxW = container.clientWidth - 4;   // small slack to avoid 1px overflow
    const maxH = container.clientHeight - 4;
    if (maxW <= 0 || maxH <= 0) return;

    // An upper bound: at most as tall as the container. (A single short word
    // could in principle be sized larger than `maxH` if cap-height < font-size,
    // but using maxH as the high bound is safe and avoids absurd intermediates.)
    let lo = 8;
    let hi = Math.max(16, Math.min(maxH * 1.5, 2000));
    let best = lo;

    // Avoid wrapping cost during measurement by leaving wrapping enabled — we
    // *want* the natural rendered scroll size for the wrapped text.
    while (lo <= hi) {
      const mid = (lo + hi) >> 1;
      textEl.style.fontSize = mid + 'px';
      // Force layout read.
      const fits = textEl.scrollWidth <= maxW && textEl.scrollHeight <= maxH;
      if (fits) {
        best = mid;
        lo = mid + 1;
      } else {
        hi = mid - 1;
      }
    }
    textEl.style.fontSize = best + 'px';
  }

  // ----- Display (fullscreen sign) view --------------------------------------
  let wakeLock = null; // ScreenWakeLockSentinel | null

  // Carousel runtime state. None of this is persisted — only the user's
  // mode/interval choices live in state.carousel.
  let carouselTimer = null;
  let carouselDisplayIdx = 0; // Which tab index is currently painted fullscreen.
  let carouselQueue = [];     // Upcoming indices for 'random' mode.

  // Paint the given tab into the fullscreen overlay. Cheap; called both on
  // initial entry and on every carousel tick.
  function paintSign(idx) {
    const t = state.tabs[idx];
    if (!t) return;
    $display.style.background = t.bg;
    $signText.style.color = t.fg;
    $signText.textContent = t.text;
    // Two-pass fit handles the 99% case; the longer post-orientation refit
    // only matters on initial entry (enterDisplay schedules that separately).
    fitText($display, $signText);
    requestAnimationFrame(() => fitText($display, $signText));
  }

  // Fisher-Yates shuffle of [0..n-1]. If `avoidFirst` matches the head of the
  // result, swap it with the second so we never see two identical signs back-
  // to-back across reshuffles.
  function buildShuffledQueue(n, avoidFirst) {
    const arr = Array.from({ length: n }, (_, i) => i);
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    if (arr.length > 1 && arr[0] === avoidFirst) {
      [arr[0], arr[1]] = [arr[1], arr[0]];
    }
    return arr;
  }

  function startCarousel() {
    stopCarousel();
    const { mode, intervalSeconds } = state.carousel;
    if (mode === 'off' || state.tabs.length <= 1) return;
    if (mode === 'random') {
      carouselQueue = buildShuffledQueue(state.tabs.length, carouselDisplayIdx);
    }
    carouselTimer = setInterval(advanceCarousel, intervalSeconds * 1000);
  }

  function stopCarousel() {
    if (carouselTimer !== null) {
      clearInterval(carouselTimer);
      carouselTimer = null;
    }
    carouselQueue = [];
  }

  function advanceCarousel() {
    let next;
    if (state.carousel.mode === 'random') {
      if (carouselQueue.length === 0) {
        carouselQueue = buildShuffledQueue(state.tabs.length, carouselDisplayIdx);
      }
      next = carouselQueue.shift();
    } else {
      // Sequential.
      next = (carouselDisplayIdx + 1) % state.tabs.length;
    }
    carouselDisplayIdx = next;
    paintSign(next);
  }

  async function enterDisplay() {
    // Paint the initially-active tab before fullscreen so the transition is
    // immediate. A blank tab is fine — it shows as a solid color, which is the
    // user's intent for that case.
    carouselDisplayIdx = state.activeTabIdx;
    paintSign(carouselDisplayIdx);
    $display.hidden = false;
    $display.setAttribute('aria-hidden', 'false');
    $display.classList.remove('has-faded');

    // The extra delayed refit covers mobile browsers that animate their chrome
    // in/out for a few hundred ms after entering fullscreen.
    setTimeout(() => { if (!$display.hidden) fitText($display, $signText); }, 350);

    // Trigger the exit-hint fade. The CSS transition has a 2.2s delay, so
    // adding this class immediately gives ~2.2s of visible hint before fade.
    $display.classList.add('has-faded');

    // Request fullscreen. Must run in a user-gesture handler — this is wired
    // to the button click, so we're good.
    try {
      const req = $display.requestFullscreen
                || $display.webkitRequestFullscreen
                || $display.msRequestFullscreen;
      if (req) await req.call($display, { navigationUI: 'hide' });
    } catch {
      // Permission denied or unsupported (e.g. iOS Safari pre-iOS17 on iPhone):
      // the overlay still covers the page, so the sign is still usable.
    }

    // Keep the screen awake while the sign is showing.
    try {
      if ('wakeLock' in navigator) {
        wakeLock = await navigator.wakeLock.request('screen');
        // The OS may revoke the lock when the tab loses focus; re-request on
        // visibilitychange handles that. Stored handler so we can remove it.
        document.addEventListener('visibilitychange', reacquireWakeLock);
      }
    } catch { /* not granted — not critical */ }

    // Refit when the viewport changes (rotation, browser chrome show/hide).
    window.addEventListener('resize', refitDisplay, { passive: true });
    window.addEventListener('orientationchange', refitDisplay, { passive: true });

    // Kick off carousel cycling if configured and we have multiple tabs.
    startCarousel();
  }

  function refitDisplay() {
    if ($display.hidden) return;
    fitText($display, $signText);
  }

  async function reacquireWakeLock() {
    if (document.visibilityState === 'visible' && !$display.hidden && 'wakeLock' in navigator) {
      try { wakeLock = await navigator.wakeLock.request('screen'); } catch {}
    }
  }

  async function exitDisplay() {
    if ($display.hidden) return;

    // Stop the carousel timer first — a tick mid-exit could try to paint into
    // a hidden overlay and clobber the editor's preview path.
    stopCarousel();

    // Tear down listeners next so a quick double-tap doesn't get caught mid-exit.
    window.removeEventListener('resize', refitDisplay);
    window.removeEventListener('orientationchange', refitDisplay);
    document.removeEventListener('visibilitychange', reacquireWakeLock);

    try { if (wakeLock) { await wakeLock.release(); wakeLock = null; } } catch {}

    try {
      if (document.fullscreenElement || document.webkitFullscreenElement) {
        const exit = document.exitFullscreen || document.webkitExitFullscreen || document.msExitFullscreen;
        if (exit) await exit.call(document);
      }
    } catch { /* ignore */ }

    $display.hidden = true;
    $display.setAttribute('aria-hidden', 'true');

    // Refit the preview now that the page is back; viewport may have changed.
    applyToPreview();
  }

  $show.addEventListener('click', enterDisplay);

  // Tap anywhere on the sign exits. Use pointerdown so it feels instantaneous
  // and so a synthesized click from the system fullscreen-exit gesture doesn't
  // race us.
  $display.addEventListener('pointerdown', (e) => {
    // Ignore non-primary buttons on devices that have them (mouse middle/right).
    if (e.button !== undefined && e.button !== 0) return;
    exitDisplay();
  });

  // Escape also exits (desktop keyboard). The browser will also handle this for
  // the Fullscreen API itself; we mirror it for the non-fullscreen fallback.
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && !$display.hidden) exitDisplay();
  });

  // If the user exits fullscreen via OS chrome (swipe-down, F11, Esc), make sure
  // our overlay also closes so they end up back in the editor.
  function onFullscreenChange() {
    const inFs = !!(document.fullscreenElement || document.webkitFullscreenElement);
    if (!inFs && !$display.hidden) exitDisplay();
  }
  document.addEventListener('fullscreenchange', onFullscreenChange);
  document.addEventListener('webkitfullscreenchange', onFullscreenChange);

  // ----- Preview refit on viewport changes -----------------------------------
  // ResizeObserver covers the most cases (container size changed for any
  // reason); we also listen to window resize as a safety net.
  const ro = new ResizeObserver(() => fitText($preview, $previewT));
  ro.observe($preview);

  // Keyboard shortcut: Ctrl/Cmd+Enter from the textarea shows the sign.
  // (No disabled check — blank signs are valid solid-color displays now.)
  $text.addEventListener('keydown', (e) => {
    if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
      e.preventDefault();
      enterDisplay();
    }
  });

  // ===========================================================================
  // Export feature
  //
  // Renders the current state to APNG / GIF / WebP / SVG / standalone HTML at
  // a user-chosen resolution.
  //
  //   • Animated formats (APNG, GIF): every tab in order, with each tab held
  //     for `state.carousel.intervalSeconds`. If the carousel is off, the
  //     output is single-frame (just the active tab). Random mode is treated
  //     as sequential for export — randomness has no meaning in a fixed-file
  //     animation.
  //   • Static formats (WebP, SVG): the currently-active tab.
  //   • HTML: a self-contained page that mirrors fullscreen behaviour, with
  //     the user's tabs + carousel settings frozen in.
  //
  // Text on each exported frame is rendered via canvas, using the same
  // binary-search auto-fit algorithm as the editor preview. Font stack uses
  // system fonts — output looks different across operating systems by
  // design (CurbSign ships no webfont).
  // ===========================================================================

  // Popular preset sizes. The label is intentionally English-only — these
  // labels are technical and recognisable internationally.
  const RESOLUTION_PRESETS = [
    { w: 1920, h: 1080, label: '1920 × 1080 (Full HD)' },
    { w: 1280, h: 720,  label: '1280 × 720 (HD)' },
    { w: 1080, h: 1920, label: '1080 × 1920 (Vertical)' },
    { w: 1080, h: 1080, label: '1080 × 1080 (Square)' },
    { w: 1200, h: 630,  label: '1200 × 630 (Social)' },
    { w:  800, h:  600, label: '800 × 600' },
    { w: 3840, h: 2160, label: '3840 × 2160 (4K)' },
  ];
  const EXPORT_FONT_STACK = '-apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, Roboto, "Helvetica Neue", Arial, sans-serif';
  const EXPORT_LINE_HEIGHT = 1.05;
  const EXPORT_PADDING_RATIO = 0.06; // fraction of min(w,h) reserved as outer padding
  const MAX_EXPORT_DIM = 16384;

  // ----- DOM refs (export) ---------------------------------------------------
  const $exportResolution = document.getElementById('export-resolution');
  const $exportW          = document.getElementById('export-w');
  const $exportH          = document.getElementById('export-h');
  const $exportButtons    = document.querySelectorAll('button.export-fmt');

  // ----- Helpers --------------------------------------------------------------
  function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

  function downloadBlob(blob, filename) {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    a.remove();
    // Defer revoke so the download has time to start in all browsers.
    setTimeout(() => URL.revokeObjectURL(url), 2000);
  }

  // Number of full Fisher-Yates passes baked into a Random-mode export. The
  // produced sequence has length RANDOM_EXPORT_PASSES × tabs.length, which
  // means playback is periodic but the period is long enough that viewers
  // don't pick up on the loop unless they're explicitly looking for it.
  const RANDOM_EXPORT_PASSES = 3;

  // The sequence of tabs used for animated exports. Static formats only ever
  // export `currentTab()`; this helper is used by APNG / GIF / animated SVG.
  //
  //   • mode = 'off' OR a single tab → one frame.
  //   • mode = 'sequential'          → tabs in tab-strip order.
  //   • mode = 'random'              → RANDOM_EXPORT_PASSES independent
  //     Fisher-Yates shuffles, concatenated; the first index of each pass is
  //     swapped with the second if it duplicates the previous pass's last
  //     index, so we never see the same sign back-to-back across a boundary.
  //     Math.random() is fresh per call, so each export of the same state
  //     yields a different baked sequence.
  function tabsForAnimation() {
    if (state.tabs.length <= 1 || state.carousel.mode === 'off') {
      return [currentTab()];
    }
    if (state.carousel.mode === 'random') {
      const out = [];
      let lastIdx = -1;
      for (let pass = 0; pass < RANDOM_EXPORT_PASSES; pass++) {
        // Reuse the runtime carousel's shuffle helper so the export and
        // fullscreen playback share the same anti-repeat behaviour.
        const indices = buildShuffledQueue(state.tabs.length, lastIdx);
        for (const i of indices) out.push(state.tabs[i]);
        lastIdx = indices[indices.length - 1];
      }
      return out;
    }
    return state.tabs.slice();
  }

  // Binary-search the largest integer font size such that the multi-line
  // `text` fits inside (width − padding × 2, height − padding × 2). Returns
  // the font size and the resolved padding. Shared by canvas + SVG export.
  function computeFitForExport(text, width, height, ctx) {
    const padding = Math.round(Math.min(width, height) * EXPORT_PADDING_RATIO);
    const maxW = width - padding * 2;
    const maxH = height - padding * 2;
    const lines = (text || '').split('\n');
    if (maxW <= 0 || maxH <= 0 || !text || !text.trim()) {
      return { fontSize: 0, padding, lines };
    }
    let lo = 8;
    let hi = Math.max(16, Math.floor(maxH));
    let best = lo;
    while (lo <= hi) {
      const mid = (lo + hi) >> 1;
      ctx.font = `900 ${mid}px ${EXPORT_FONT_STACK}`;
      const lh = mid * EXPORT_LINE_HEIGHT;
      const totalH = lh * lines.length;
      let widest = 0;
      for (const line of lines) {
        const w = ctx.measureText(line).width;
        if (w > widest) widest = w;
      }
      if (widest <= maxW && totalH <= maxH) { best = mid; lo = mid + 1; }
      else { hi = mid - 1; }
    }
    return { fontSize: best, padding, lines };
  }

  // Render one tab into a fresh canvas at the requested resolution.
  function renderTabToCanvas(tab, width, height) {
    const canvas = document.createElement('canvas');
    canvas.width = width;
    canvas.height = height;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = tab.bg;
    ctx.fillRect(0, 0, width, height);

    const fit = computeFitForExport(tab.text, width, height, ctx);
    if (!fit.fontSize) return canvas;

    ctx.fillStyle = tab.fg;
    ctx.font = `900 ${fit.fontSize}px ${EXPORT_FONT_STACK}`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const lh = fit.fontSize * EXPORT_LINE_HEIGHT;
    const totalH = lh * fit.lines.length;
    const startY = height / 2 - totalH / 2 + lh / 2;
    fit.lines.forEach((line, i) => {
      ctx.fillText(line, width / 2, startY + i * lh);
    });
    return canvas;
  }

  // ----- APNG (UPNG.js) -------------------------------------------------------
  async function exportApng(width, height) {
    const tabs = tabsForAnimation();
    const delayMs = Math.max(20, Math.round(state.carousel.intervalSeconds * 1000));
    const buffers = [];
    const delays = [];
    for (const tab of tabs) {
      const canvas = renderTabToCanvas(tab, width, height);
      const data = canvas.getContext('2d').getImageData(0, 0, width, height).data;
      buffers.push(data.buffer);
      delays.push(delayMs);
    }
    // UPNG.encode(frames, w, h, cnum, dels). cnum=0 → lossless RGBA. For our
    // solid-color frames the encoded output stays tiny even at 0.
    const bytes = UPNG.encode(buffers, width, height, 0, delays);
    downloadBlob(new Blob([bytes], { type: 'image/apng' }), 'curbsign.apng');
  }

  // ----- GIF (omggif) --------------------------------------------------------
  // omggif requires us to supply an indexed-color palette per frame. We use a
  // 2-color palette (bg, fg) and binary-quantize each pixel — at sign-sized
  // resolutions and bold text this looks crisp without needing dithering.
  function quantizeBinary(imageData, bgHex, fgHex) {
    const bg = hexToRgb(bgHex);
    const fg = hexToRgb(fgHex);
    const palette = [
      (bg.r << 16) | (bg.g << 8) | bg.b,
      (fg.r << 16) | (fg.g << 8) | fg.b,
    ];
    const data = imageData.data;
    const indices = new Uint8Array(imageData.width * imageData.height);
    for (let i = 0, p = 0; i < data.length; i += 4, p++) {
      const dr1 = data[i] - bg.r, dg1 = data[i+1] - bg.g, db1 = data[i+2] - bg.b;
      const dr2 = data[i] - fg.r, dg2 = data[i+1] - fg.g, db2 = data[i+2] - fg.b;
      const dBg = dr1*dr1 + dg1*dg1 + db1*db1;
      const dFg = dr2*dr2 + dg2*dg2 + db2*db2;
      indices[p] = dFg < dBg ? 1 : 0;
    }
    return { indices, palette };
  }

  async function exportGif(width, height) {
    const tabs = tabsForAnimation();
    // GIF delays are in 1/100 second units. Floor at 2cs because most viewers
    // bump anything below to 10cs anyway.
    const delayCs = Math.max(2, Math.round(state.carousel.intervalSeconds * 100));
    // Generous upper-bound buffer. Indexed frames are ≤ 1 byte/pixel + small
    // per-frame overhead; 1.5× of that is more than enough.
    const bufSize = Math.ceil(width * height * tabs.length * 1.5) + 4096;
    const buf = new Uint8Array(bufSize);
    const gif = new GifWriter(buf, width, height, { loop: 0 });
    for (const tab of tabs) {
      const canvas = renderTabToCanvas(tab, width, height);
      const imageData = canvas.getContext('2d').getImageData(0, 0, width, height);
      const { indices, palette } = quantizeBinary(imageData, tab.bg, tab.fg);
      gif.addFrame(0, 0, width, height, indices, { palette, delay: delayCs });
    }
    const len = gif.end();
    downloadBlob(new Blob([buf.slice(0, len)], { type: 'image/gif' }), 'curbsign.gif');
  }

  // ----- WebP (native canvas.toBlob) -----------------------------------------
  // Static, active tab only. Animated WebP encoding in-browser requires a
  // ~200 KB WASM library, so it's intentionally out of scope.
  function exportWebp(width, height) {
    const canvas = renderTabToCanvas(currentTab(), width, height);
    canvas.toBlob((blob) => {
      if (blob) downloadBlob(blob, 'curbsign.webp');
    }, 'image/webp', 0.95);
  }

  // ----- SVG -----------------------------------------------------------------
  // Build the <text> element for one tab. Uses the same auto-fit math against
  // an offscreen canvas for measuring — SVG viewers will rasterise the result
  // with their own font, so the output position is approximate but very close.
  function buildSvgTextElement(tab, width, height, measureCtx) {
    const fit = computeFitForExport(tab.text, width, height, measureCtx);
    if (!fit.fontSize) return '';
    const lh = fit.fontSize * EXPORT_LINE_HEIGHT;
    const totalH = lh * fit.lines.length;
    const startY = height / 2 - totalH / 2 + lh / 2;
    const escape = (s) => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    const tspans = fit.lines.map((line, i) =>
      `<tspan x="${width / 2}" y="${(startY + i * lh).toFixed(2)}">${escape(line)}</tspan>`
    ).join('');
    return `<text font-family="${EXPORT_FONT_STACK.replace(/"/g, '&quot;')}" `
         + `font-size="${fit.fontSize}" font-weight="900" `
         + `fill="${tab.fg}" text-anchor="middle" `
         + `dominant-baseline="middle">${tspans}</text>`;
  }

  // Build the discrete-mode visibility <animate> for frame `i` of `n`. The
  // total cycle is `totalDur` seconds; each frame's slot is `totalDur / n`.
  //
  // discrete calcMode means: at time keyTimes[k]·dur, the displayed value
  // jumps to values[k]. So for a frame visible during slot [i, i+1] out of n:
  //   - i === 0:       values "visible;hidden", switches off at 1/n
  //   - i === n-1:     values "hidden;visible", switches on at (n-1)/n
  //   - otherwise:     values "hidden;visible;hidden" with two switches
  function buildSvgFrameAnimate(i, n, totalDur) {
    const fmt = (x) => x.toFixed(4).replace(/\.?0+$/, '');
    const common = `attributeName="visibility" calcMode="discrete" `
                 + `dur="${totalDur}s" repeatCount="indefinite"`;
    if (i === 0) {
      return `<animate ${common} values="visible;hidden" keyTimes="0;${fmt(1 / n)}"/>`;
    }
    if (i === n - 1) {
      return `<animate ${common} values="hidden;visible" keyTimes="0;${fmt(i / n)}"/>`;
    }
    return `<animate ${common} values="hidden;visible;hidden" `
         + `keyTimes="0;${fmt(i / n)};${fmt((i + 1) / n)}"/>`;
  }

  // Multi-frame when carousel mode is on and we have ≥ 2 tabs; otherwise a
  // static SVG of the active tab. Animation uses SMIL `<animate>` toggling
  // each tab group's visibility on a fixed loop — supported by browsers and
  // GitHub-style Markdown renderers; image editors (Photoshop, etc.) will
  // rasterise the first visible frame.
  function exportSvg(width, height) {
    const tabs = tabsForAnimation();
    const n = tabs.length;
    const measure = document.createElement('canvas').getContext('2d');

    let body;
    if (n <= 1) {
      const tab = tabs[0];
      body = `<rect width="${width}" height="${height}" fill="${tab.bg}"/>`
           + buildSvgTextElement(tab, width, height, measure);
    } else {
      const totalDur = Math.max(0.1, n * (state.carousel.intervalSeconds || 5));
      // One <g> per frame. The first starts visible; the rest start hidden so
      // the very first paint (before SMIL begins) matches frame 0.
      body = tabs.map((tab, i) => {
        const initVis = i === 0 ? 'visible' : 'hidden';
        return `<g visibility="${initVis}">`
             + `<rect width="${width}" height="${height}" fill="${tab.bg}"/>`
             + buildSvgTextElement(tab, width, height, measure)
             + buildSvgFrameAnimate(i, n, totalDur)
             + `</g>`;
      }).join('');
    }

    const svg = `<?xml version="1.0" encoding="UTF-8"?>\n`
              + `<svg xmlns="http://www.w3.org/2000/svg" width="${width}" `
              + `height="${height}" viewBox="0 0 ${width} ${height}">${body}</svg>`;
    downloadBlob(new Blob([svg], { type: 'image/svg+xml;charset=utf-8' }), 'curbsign.svg');
  }

  // ----- Standalone HTML -----------------------------------------------------
  // Outputs a tiny self-contained page that displays the user's sign(s)
  // fullscreen and cycles per their carousel settings. The embedded JSON
  // payload is stamped into a fixed marker.
  const STANDALONE_HTML_TEMPLATE = `<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>CurbSign</title>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; }
  body { display: flex; align-items: center; justify-content: center; text-align: center; cursor: pointer; overflow: hidden; }
  #t { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; font-weight: 900; line-height: 1.05; white-space: pre-line; overflow-wrap: anywhere; padding: 12px; max-width: 100%; max-height: 100%; }
</style>
</head>
<body><div id="t"></div>
<script>
"use strict";
var S = __STATE__;
var body = document.body, text = document.getElementById('t');
var i = (typeof S.activeTabIdx === 'number' ? S.activeTabIdx : 0);
function fit() {
  var maxW = body.clientWidth - 4, maxH = body.clientHeight - 4;
  if (maxW <= 0 || maxH <= 0) return;
  var lo = 8, hi = Math.max(16, Math.min(maxH * 1.5, 2000)), best = lo;
  while (lo <= hi) {
    var mid = (lo + hi) >> 1;
    text.style.fontSize = mid + 'px';
    if (text.scrollWidth <= maxW && text.scrollHeight <= maxH) { best = mid; lo = mid + 1; }
    else { hi = mid - 1; }
  }
  text.style.fontSize = best + 'px';
}
function paint(k) {
  var tab = S.tabs[k];
  body.style.background = tab.bg;
  text.style.color = tab.fg;
  text.textContent = tab.text || '';
  fit();
  requestAnimationFrame(fit);
}
paint(i);
if (S.tabs.length > 1 && S.carousel && S.carousel.mode !== 'off') {
  setInterval(function () {
    i = (i + 1) % S.tabs.length;
    paint(i);
  }, (S.carousel.intervalSeconds || 5) * 1000);
}
window.addEventListener('resize', fit);
window.addEventListener('orientationchange', fit);
<\/script>
</body>
</html>
`;

  function exportHtml() {
    const payload = {
      tabs: state.tabs,
      activeTabIdx: state.activeTabIdx,
      carousel: state.carousel,
    };
    const out = STANDALONE_HTML_TEMPLATE.replace('__STATE__', JSON.stringify(payload));
    downloadBlob(new Blob([out], { type: 'text/html;charset=utf-8' }),
                 'curbsign-export.html');
  }

  // ----- UI wiring -----------------------------------------------------------
  function renderResolutionDropdown() {
    if ($exportResolution.children.length) return;
    const frag = document.createDocumentFragment();
    for (const p of RESOLUTION_PRESETS) {
      const opt = document.createElement('option');
      opt.value = p.w + 'x' + p.h;
      opt.textContent = p.label;
      frag.appendChild(opt);
    }
    // "Custom" option is translatable.
    const custom = document.createElement('option');
    custom.value = 'custom';
    custom.dataset.t = 'size_custom';
    custom.textContent = t('size_custom');
    frag.appendChild(custom);
    $exportResolution.appendChild(frag);
    syncDropdownFromInputs();
  }

  function syncDropdownFromInputs() {
    const w = Number($exportW.value);
    const h = Number($exportH.value);
    const match = RESOLUTION_PRESETS.find(p => p.w === w && p.h === h);
    $exportResolution.value = match ? (w + 'x' + h) : 'custom';
  }

  $exportResolution.addEventListener('change', () => {
    const v = $exportResolution.value;
    if (v === 'custom') return; // keep current w/h inputs as-is
    const [w, h] = v.split('x').map(Number);
    $exportW.value = String(w);
    $exportH.value = String(h);
  });
  $exportW.addEventListener('input', syncDropdownFromInputs);
  $exportH.addEventListener('input', syncDropdownFromInputs);

  $exportButtons.forEach(btn => {
    btn.addEventListener('click', async () => {
      const fmt = btn.dataset.fmt;
      const w = clamp(Math.round(Number($exportW.value)) || 1920, 16, MAX_EXPORT_DIM);
      const h = clamp(Math.round(Number($exportH.value)) || 1080, 16, MAX_EXPORT_DIM);
      // Disable all format buttons during the export so the user can't queue
      // a parallel run; restore on completion.
      $exportButtons.forEach(b => b.disabled = true);
      try {
        if      (fmt === 'apng') await exportApng(w, h);
        else if (fmt === 'gif')  await exportGif(w, h);
        else if (fmt === 'webp') exportWebp(w, h);
        else if (fmt === 'svg')  exportSvg(w, h);
        else if (fmt === 'html') exportHtml();
      } catch (err) {
        console.error('Export failed:', err);
        alert('Export failed: ' + (err && err.message ? err.message : err));
      } finally {
        $exportButtons.forEach(b => b.disabled = false);
      }
    });
  });

  renderResolutionDropdown();
  </script>
</body>
</html>
